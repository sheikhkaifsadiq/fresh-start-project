version: '3.8'

services:
  ml-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-ml-engine
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      # API Key for authentication (must be provided in the host environment or .env file)
      - API_KEY=${API_KEY}
    volumes:
      - ./api:/app/api
      - ./models:/app/models
      - ./data:/app/data
